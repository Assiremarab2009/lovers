<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For My Love</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
        
        body { 
            background: radial-gradient(circle, #2d004d, #10002b); 
            font-family: 'Dancing Script', cursive; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            color: white; 
            text-align: center;
        }

        #question-container { z-index: 10; transition: 0.5s; }
        
        #yesBtn { 
            padding: 15px 30px; 
            font-size: 20px; 
            background: #9d4edd; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: 0.2s;
            margin: 10px;
        }

        #noBtn { 
            padding: 15px 30px; 
            font-size: 20px; 
            background: #5a189a; 
            color: #e0aaff; 
            border: 2px solid #7b2cbf; 
            border-radius: 50px; 
            cursor: pointer;
        }

        #flowers-container { display: none; width: 100%; }
        
        /* تصميم الورود البنفسجية */
        .rose-box { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 50px; }
        .rose-item { font-size: 50px; cursor: pointer; transition: 0.3s; }
        .rose-item:hover { transform: scale(1.3); }
    </style>
</head>
<body>

<div id="question-container">
    <h1 id="question-text">My life is brighter with you. Will you be mine? 💜</h1>
    <button id="yesBtn" onclick="showFlowers()">Yes!</button>
    <button id="noBtn" onclick="nextNo()">No</button>
</div>

<div id="flowers-container">
    <h1>I love you forever! 🌹✨</h1>
    <div class="rose-box">
        <div class="rose-item">🌹</div>
        <div class="rose-item">💜</div>
        <div class="rose-item">🌸</div>
        <div class="rose-item">💖</div>
        <div class="rose-item">🌷</div>
    </div>
</div>

<script>
    let noCount = 0;
    const noTexts = ["Why?", "You hate me?", "What!!", "Why did you do that!!!"];

    function nextNo() {
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        
        // تغيير نص زر No
        if (noCount < noTexts.length) {
            noBtn.innerText = noTexts[noCount];
            noCount++;
        }
        
        // تكبير زر Yes
        let currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
        yesBtn.style.fontSize = (currentSize + 15) + "px";
        yesBtn.style.padding = (15 + noCount * 5) + "px " + (30 + noCount * 10) + "px";
    }

    function showFlowers() {
        document.getElementById('question-container').style.display = 'none';
        document.getElementById('flowers-container').style.display = 'block';
    }
</script>

</body>
</html>
